<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes habitudes sportives</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>🏋️ Mes habitudes</h1>
        <p>Un tableau interactif pour suivre ta routine quotidienne.</p>
      </header>

      <section class="stats" aria-label="Résumé des habitudes">
        <article>
          <h2 id="totalHabits">0</h2>
          <p>Habitudes actives</p>
        </article>
        <article>
          <h2 id="dailyHabits">0</h2>
          <p>Fréquence quotidienne</p>
        </article>
        <article>
          <h2 id="totalStreak">0</h2>
          <p>Streak total</p>
        </article>
      </section>

      <section class="controls" aria-label="Ajouter une habitude">
        <form id="habitForm" class="habit-form">
          <label>
            Habitude
            <input id="habitName" name="name" type="text" placeholder="Ex: 30 pompes" required maxlength="80" />
          </label>

          <label>
            Fréquence
            <select id="habitFrequency" name="frequency">
              <option value="daily">Quotidienne</option>
              <option value="weekly">Hebdomadaire</option>
              <option value="monthly">Mensuelle</option>
            </select>
          </label>

          <button type="submit">Ajouter</button>
        </form>
      </section>

      <section class="habits-section">
        <h2>Programme du jour</h2>
        <ul id="habitList" class="habit-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
